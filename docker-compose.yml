services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    command: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data

  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one
    ports:
      - "16686:16686"
      - "4317:4317"

volumes:
  postgres:
